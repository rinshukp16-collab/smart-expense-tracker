<!DOCTYPE html>
<html>

<head>
    <title>Edit Expense</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body style="font-family: sans-serif; background-color: #fdf6f0; padding: 50px;">
    <div
        style="max-width: 500px; margin: auto; background: white; padding: 30px; border-radius: 20px; shadow: 0 10px 25px rgba(0,0,0,0.05);">
        <h2>Edit Expense</h2>
        <form method="POST">
            <input type="text" name="item" value="{{ expense.item }}"
                style="width: 100%; padding: 10px; margin-bottom: 10px;" required>
            <input type="number" step="0.01" name="amount" value="{{ expense.amount }}"
                style="width: 100%; padding: 10px; margin-bottom: 10px;" required>
            <select name="category" style="width: 100%; padding: 10px; margin-bottom: 20px;">
                <option value="Food" {% if expense.category=='Food' %}selected{% endif %}>Food</option>
                <option value="Travel" {% if expense.category=='Travel' %}selected{% endif %}>Travel</option>
                <option value="Savings" {% if expense.category=='Savings' %}selected{% endif %}>Savings</option>
                <option value="Other" {% if expense.category=='Other' %}selected{% endif %}>Other</option>
            </select>
            <button type="submit"
                style="background: #b8e0d2; color: #4a7c6d; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; width: 100%;">Update
                Expense</button>
        </form>
        <a href="/" style="display: block; text-align: center; margin-top: 15px; color: #777;">Cancel</a>
    </div>
</body>

</html>
